<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0; padding: 0; width: 1200px; height: 630px;
    background-color: #E8EBE6;
    overflow: hidden;
    position: relative;
    font-family: 'Bebas Neue', sans-serif;
  }
  .avatar {
    position: absolute;
    left: 80px;
    bottom: 0px;
    height: 550px;
  }
  .name {
    position: absolute;
    right: 80px;
    top: 140px;
    color: #0A3D32;
    text-align: right;
    line-height: 0.85;
    letter-spacing: -2px;
  }
  .first { font-size: 140px; display: block; }
  .last { font-size: 140px; display: block; margin-top: 10px;}
</style>
</head>
<body>
  <img src="homeportrait_transparent.png" class="avatar">
  <div class="name">
    <span class="first">KOMALPREET</span>
    <span class="last">KAUR</span>
  </div>
</body>
</html>
